# GitLab CI — build the WP7 course site and publish it via GitLab Pages.
#
# Runner: `gamma2-cogpy` shell executor on gamma2 (assigned 2026-04-15).
# Because this is a shell executor (not Docker), the `image:` directive is
# silently ignored — jobs run in the runner's normal user shell, so we have
# to bring our own Python environment.
#
# History of CI breakage on this runner (don't reintroduce):
#   1. First attempt used `python -m pip ...` — failed because gamma2 has
#      no `python` alias, only `python3`.
#   2. Second attempt used `python3 -m venv .ci-venv` — failed because the
#      gamma2 system python3 has no `ensurepip` / `python3-venv` package
#      installed.
#
# Current approach: use the shared wp7 conda env's Python at
#   /storage/share/python/environments/Anaconda3/envs/wp7/bin/python3
# which is a full Anaconda install (has venv + ensurepip + pip). It's
# group-readable from any HPC node, so the runner can use it without
# touching the env itself. We create a per-job .ci-venv/ from THAT python,
# install mkdocs-material into the venv, and export its bin/ onto PATH.
#
# When the future pixi env is up at /storage2/wp7/env/.pixi/envs/default/,
# WP7_PYTHON below can be repointed there instead.
#
# This file lives inside the `public/` subdataset of `wp7-course` and drives
# the GitLab repo `sirotalab/wp7-course-public`. The *outer* wp7-course repo
# (with solutions, sourcedata, planning docs, roster CSV) is private and has
# no Pages job — the trust boundary is structural: solutions literally don't
# exist inside `public/`, so they can't reach the deployed site even by
# accident.
#
# Layout (inside this repo):
#   ./site/                 mkdocs source (docs_dir = site/docs)
#   ./course-materials/     student-downloadable files (not served via Pages)
#
# Pages serves whatever the `pages` job writes to `./public/` at artifact
# time. The directory name `public/` is a GitLab Pages convention and is
# unrelated to the outer project's `public/` subdataset (same git repo
# viewed from different sides; inside the CI runner there's only one tree).
#
# Two jobs:
#   * `build` — runs on every branch and every merge request, catches broken
#     markdown / nav / links via `mkdocs build --strict` before review.
#   * `pages` — runs only on the default branch, deploys the site to Pages.

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  MKDOCS_MATERIAL_SPEC: "mkdocs-material>=9.5,<10"
  WP7_PYTHON: "/storage/share/python/environments/Anaconda3/envs/wp7/bin/python3"

cache:
  key: pip-mkdocs
  paths:
    - .cache/pip

default:
  before_script:
    # Use the shared wp7 conda env's Python (has venv + ensurepip baked in);
    # gamma2's system python3 is missing the python3-venv package.
    # Each of these steps is wrapped as a YAML single-quoted scalar so that
    # shell constructs like `$VAR`, `&&`, and `|` don't collide with YAML
    # block syntax. Double-up internal single quotes if you need them.
    - 'if [ ! -x "$WP7_PYTHON" ]; then echo "ERROR: $WP7_PYTHON not found or not executable"; exit 1; fi'
    - '"$WP7_PYTHON" -m venv .ci-venv'
    - '.ci-venv/bin/pip install --upgrade pip'
    - '.ci-venv/bin/pip install "$MKDOCS_MATERIAL_SPEC"'
    - 'export PATH="$CI_PROJECT_DIR/.ci-venv/bin:$PATH"'
    - 'mkdocs --version'

stages:
  - build
  - deploy

# Feature-branch + MR build: fails fast on bad markdown, no deploy.
build:
  stage: build
  script:
    - cd site
    - mkdocs build --strict --site-dir /tmp/pages-preview
  rules:
    - if: '$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Default-branch deploy job. GitLab Pages magic: the job must be named
# `pages` and its artifact must be a directory called `public/` at the
# repo root. mkdocs builds there directly.
pages:
  stage: deploy
  script:
    - cd site
    - mkdocs build --strict --site-dir ../public
  artifacts:
    paths:
      - public
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
