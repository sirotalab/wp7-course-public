# GitLab CI — build the WP7 course site and publish it via GitLab Pages.
#
# Runner: `gamma2-cogpy` shell executor on gamma2 (assigned 2026-04-15).
# Because this is a shell executor (not Docker), the `image:` directive is
# silently ignored — jobs run in the runner's normal user shell, so we have
# to bring our own Python environment.
#
# History of CI breakage on this runner (don't reintroduce):
#   1. python -m pip  — no `python` alias on gamma2, only `python3`.
#   2. python3 -m venv — no `ensurepip` / `python3-venv` on gamma2.
#   3. Shell brace groups in YAML — `{` collides with YAML flow mappings.
#   4. uv installer — modifies ~/.profile with a hardcoded path inside the
#      build dir; on retry the file is cleaned up and the shell dies.
#
# Current approach: **pixi**. Single static binary, brings its own Python
# from conda-forge, no system dependencies. The same pixi.toml that ships
# the student toolchain (datalad + git-annex) also defines a `docs`
# environment with mkdocs-material for the site build. One tool for
# everything in public/.
#
# This file lives inside the `public/` subdataset of `wp7-course` and drives
# the GitLab repo `sirotalab/wp7-course-public`. The outer wp7-course repo
# (solutions, sourcedata, planning, roster) is private and has no Pages job —
# the trust boundary is structural: solutions don't exist inside `public/`.
#
# Layout (inside this repo):
#   ./site/                 mkdocs source (docs_dir = site/docs)
#   ./course-materials/     student-downloadable files (not served via Pages)
#   ./pixi.toml             toolchain definition (student + docs envs)
#
# Two jobs:
#   * `build`  — every branch / MR, catches broken markdown before review.
#   * `pages`  — default branch only, deploys the site to Pages.

variables:
  # Keep pixi state inside the build dir so nothing leaks into $HOME.
  PIXI_HOME: "$CI_PROJECT_DIR/.pixi-home"

cache:
  key: pixi-mkdocs
  paths:
    - .pixi              # pixi environments (conda packages)
    - .pixi-home         # pixi global state

default:
  before_script:
    - 'curl -fsSL https://pixi.sh/install.sh | PIXI_HOME="$PIXI_HOME" bash'
    - 'export PATH="$PIXI_HOME/bin:$PATH"'
    - 'pixi --version'

stages:
  - build
  - deploy

build:
  stage: build
  script:
    - 'pixi run -e docs build-preview'
  rules:
    - if: '$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# GitLab Pages: job must be named `pages`, artifact must be `public/`.
pages:
  stage: deploy
  script:
    - 'pixi run -e docs build-site'
  artifacts:
    paths:
      - public
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
