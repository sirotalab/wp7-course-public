site_name: WP7 — Machine Learning & Analysis of Neural Data
site_description: GSN practicum course (Sirota / Mlynarski)
# Group-level Pages URL on LRZ GitLab. Requires the project's
# "Use unique domain" setting to be OFF (Project → Settings → Pages).
# Same format as sirotalab/labbox's site_url.
site_url: https://sirotalab.pages.gitlab.lrz.de/wp7-course-public/
repo_url: https://gitlab.lrz.de/sirotalab/wp7-course-public
repo_name: sirotalab/wp7-course-public
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quick start: quickstart.md
  - Schedule: schedule.md
  - Setup:
      - Request SSH access: tools/request-access.html
      - SSH: setup/ssh.md
      - Interactive SSH tool: tools/ssh-setup.html
      - VS Code Remote: setup/vscode.md
      - Conda environment: setup/conda.md
      - HPC workspace: setup/workspace.md
  - Lectures: lectures.md
  - Exercises:
      - Overview: exercises/index.md
      - Ex1 — Bootstrap: exercises/ex1.md
      - Ex2 — Dimensionality reduction: exercises/ex2.md
      - Ex3 — Univariate spectral analysis: exercises/ex3.md
      - Ex4 — Time-resolved spectral analysis: exercises/ex4.md
      - Ex5 — Bivariate spectral analysis: exercises/ex5.md
  - Submissions: submissions.md
