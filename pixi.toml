[workspace]
name = "wp7-course"
description = "Course materials environment for WP7 — Machine Learning & Analysis of Neural Data"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

# Scientific Python stack for all WP7 exercises (Ex1–Ex10).
# Matches the shared `wp7` conda env on the lab HPC.
[dependencies]
python = ">=3.11,<3.13"
numpy = ">=1.26"
scipy = ">=1.11"
matplotlib = ">=3.8"
seaborn = ">=0.13"
scikit-learn = ">=1.4"
pandas = ">=2.1"
xarray = ">=2023.10"
tqdm = ">=4.66"
statsmodels = ">=0.14"
ipywidgets = ">=8.1"
jupyterlab = ">=4.0"
ipykernel = ">=6.25"
# Spectral analysis (Ex5–Ex9). ghostipy is optional — wp7_helpers falls back to scipy.
ghostipy = ">=0.2"
mne = ">=1.6"
# Ex2 needs OpenCV for Gabor filter demo
opencv = ">=4.9"
# Datalad for syncing the course-materials dataset to your laptop (read-only).
datalad = ">=1.2,<2"

[tasks]
lab = "jupyter lab"
kernel-install = "python -m ipykernel install --user --name wp7 --display-name 'Python (wp7)'"
smoke-test = "python -c 'import numpy, scipy, matplotlib, sklearn, mne, ghostipy; print(\"all imports OK\")'"
