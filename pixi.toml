[workspace]
name = "wp7-course"
description = "Course materials environment for WP7 — Machine Learning & Analysis of Neural Data"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

# Scientific Python stack for all WP7 exercises (Ex1–Ex10).
# Single source of truth — HPC and laptop both pull from here.
[dependencies]
python = ">=3.11,<3.13"
numpy = ">=1.26"
scipy = ">=1.11"
matplotlib = ">=3.8"
seaborn = ">=0.13"
scikit-learn = ">=1.4"
pandas = ">=2.1"
xarray = ">=2023.10"
tqdm = ">=4.66"
statsmodels = ">=0.14"
ipywidgets = ">=8.1"
jupyterlab = ">=4.0"
ipykernel = ">=6.25"
# Spectral analysis (Ex5–Ex9). ghostipy is PyPI-only; installed via pip in the
# [pypi-dependencies] block below. wp7_helpers falls back to scipy when absent.
mne = ">=1.6"
# Ex2 needs OpenCV for Gabor filter demo
opencv = ">=4.9"
# Datalad for syncing wp7-course-materials (read-only) and your HPC work (bidirectional).
datalad = ">=1.2,<2"

# PyPI-only packages (installed via pip into the pixi env).
[pypi-dependencies]
ghostipy = ">=0.2"

# Put the env's lib dir first on LD_LIBRARY_PATH so conda-forge's newer
# libstdc++ (needed by libicu ≥78) wins over older system /usr/lib. Without
# this, `jupyter nbconvert --execute` crashes with "CXXABI_1.3.15 not found"
# on hosts with a gcc-12-era system libstdc++ (e.g. gamma3, 2026-04).
# Done via an activation script so $CONDA_PREFIX is already set when
# the assignment evaluates (direct [activation.env] doesn't expand shell
# variables at toml-parse time).
[activation]
scripts = ["scripts/pixi_activate.sh"]

# -----------------------------------------------------------------------------
# Student-facing tasks — run via `pixi run <name>`
# -----------------------------------------------------------------------------
#
# Bootstrap (run once on laptop)
# ------------------------------
[tasks.setup-ssh]
cmd = "python scripts/setup_ssh.py"
description = "First-time SSH setup: keys, ~/.ssh/config, copy to HPC (laptop only)"

[tasks.check-connection]
cmd = "ssh -o ConnectTimeout=5 -o BatchMode=yes gamma3 echo ok"
description = "Verify passwordless SSH to gamma3 works"

# Daily use (laptop → HPC)
# ------------------------
[tasks.code]
cmd = "python scripts/open_vscode.py"
description = "Open VS Code Remote to your HPC workspace (laptop only)"

# In-env work (anywhere pixi is)
# ------------------------------
[tasks.lab]
cmd = "jupyter lab"
description = "Start JupyterLab in the current directory"

[tasks.start]
cmd = "python scripts/start_exercise.py"
description = "Create your working copy for an exercise. Usage: pixi run start ex2"

[tasks.submit]
cmd = "python scripts/submit.py"
description = "Validate + register an exercise submission. Usage: pixi run submit ex1"

[tasks.smoke-test]
cmd = "python -c 'import numpy, scipy, matplotlib, sklearn, mne, ghostipy; print(\"all imports OK\")'"
description = "Verify the scientific stack is importable"

[tasks.kernel-install]
cmd = "python -m ipykernel install --user --name wp7 --display-name 'Python (wp7)'"
description = "Register this pixi env as a Jupyter kernel named 'wp7'"

# Sync — the daily-loop pull task
# -------------------------------
[tasks.sync]
cmd = "datalad update --merge origin && datalad get ."
description = "Pull TA updates (new exercises, bugfixes, released solutions) + fetch any new annexed data"
